<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Numify — Subscribe</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="center-page">
  <div class="subscribe-wrap">
    <div class="logo-mark">N</div>
    <h1>Choose your plan</h1>
    <p class="subtitle" id="userEmail"></p>

    <div id="successMsg" class="success-msg" style="display:none">
      ✅ Request sent! We will activate your account after payment confirmation.
    </div>

    <div class="plans">
      <div class="plan-card">
        <div class="plan-duration">30 days</div>
        <div class="plan-price">100 <span>TND</span></div>
        <button class="btn-plan" onclick="subscribe('30days')">Get started</button>
      </div>
      <div class="plan-card featured">
        <div class="plan-badge">Most popular</div>
        <div class="plan-duration">90 days</div>
        <div class="plan-price">250 <span>TND</span></div>
        <button class="btn-plan" onclick="subscribe('90days')">Get started</button>
      </div>
      <div class="plan-card">
        <div class="plan-duration">1 year</div>
        <div class="plan-price">850 <span>TND</span></div>
        <button class="btn-plan" onclick="subscribe('year')">Get started</button>
      </div>
    </div>

    <p class="help-text">After choosing a plan, send your payment and we will activate your account within 24h.</p>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import { onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const BACKEND = "https://numify-backend-a139.onrender.com";

    onAuthStateChanged(auth, (user) => {
      if (!user) { location.href = "index.html"; return; }
      document.getElementById("userEmail").textContent = user.email;
    });

    window.subscribe = async (plan) => {
      const user = auth.currentUser;
      if (!user) return;
      const token = await user.getIdToken();
      try {
        const res = await fetch(`${BACKEND}/request-subscription`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ plan })
        });
        if (res.ok) {
          document.getElementById("successMsg").style.display = "block";
        } else {
          alert("Something went wrong, try again.");
        }
      } catch(e) {
        alert("Cannot reach server: " + e.message);
      }
    };

    window.logout = () => signOut(auth).then(() => location.href = "index.html");
  </script>
</body>
</html>
